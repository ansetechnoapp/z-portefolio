<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Portfolio</title>
  <link rel="stylesheet" href="css/style.css">
  <meta name="robots" content="index,follow">
</head>
<body>
  <header class="header">
    <div class="container">
      <h1 id="portfolio-title" class="title">Portfolio</h1>
      <p id="portfolio-subtitle" class="subtitle">Projects • Skills • Experiences • Testimonials</p>
    </div>
  </header>
  <main class="container">
    <section id="projects" class="section">
      <h2 class="section-title">Projects</h2>
      <div id="projects-container" class="grid"></div>
    </section>
    <section id="skills" class="section">
      <h2 class="section-title">Skills</h2>
      <div id="skills-container" class="tags"></div>
    </section>
    <section id="experiences" class="section">
      <h2 class="section-title">Experiences</h2>
      <div id="experiences-container" class="list"></div>
    </section>
    <section id="testimonials" class="section">
      <h2 class="section-title">Testimonials</h2>
      <div id="testimonials-container" class="list"></div>
    </section>
  </main>
  <script type="module" src="js/app.js"></script>
</body>
</html>
