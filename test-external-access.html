<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Accès Externe Portfolio</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .success { color: green; }
        .error { color: red; }
        .warning { color: orange; }
        .result { background: #f5f5f5; padding: 10px; margin: 10px 0; border-radius: 5px; }
        pre { background: #000; color: #fff; padding: 10px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>Test d'accès aux données Portfolio depuis un site externe</h1>
    
    <div id="results"></div>

    <script>
        // Configuration du test
        const API_URL = 'https://api.zoddev.site/api/portfolio/v1/public';
        const API_TOKEN = 'zb_wkJsRJPrBES_fkzRojvDmS1z5sd7toyaUOdI1Jy5iug';
        
        const resultsDiv = document.getElementById('results');
        
        function addResult(title, content, type = 'info') {
            const resultDiv = document.createElement('div');
            resultDiv.className = 'result';
            resultDiv.innerHTML = `
                <h3 class="${type}">${title}</h3>
                <pre>${typeof content === 'object' ? JSON.stringify(content, null, 2) : content}</pre>
            `;
            resultsDiv.appendChild(resultDiv);
        }

        async function testCORS() {
            try {
                addResult('Test 1: Vérification CORS', 'Envoi d\'une requête OPTIONS...', 'warning');
                
                const response = await fetch(`${API_URL}/all`, {
                    method: 'OPTIONS',
                    headers: {
                        'Origin': 'https://example.com',
                        'Access-Control-Request-Method': 'GET',
                        'Access-Control-Request-Headers': 'authorization,x-api-key'
                    }
                });
                
                addResult('Réponse CORS', {
                    status: response.status,
                    statusText: response.statusText,
                    headers: {
                        'Access-Control-Allow-Origin': response.headers.get('Access-Control-Allow-Origin'),
                        'Access-Control-Allow-Methods': response.headers.get('Access-Control-Allow-Methods'),
                        'Access-Control-Allow-Headers': response.headers.get('Access-Control-Allow-Headers'),
                        'Access-Control-Allow-Credentials': response.headers.get('Access-Control-Allow-Credentials')
                    }
                }, response.ok ? 'success' : 'error');
                
            } catch (error) {
                addResult('Erreur CORS', error.message, 'error');
            }
        }

        async function testDataAccess() {
            try {
                addResult('Test 2: Accès aux données', 'Envoi d\'une requête GET avec token...', 'warning');
                
                const response = await fetch(`${API_URL}/all`, {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${API_TOKEN}`,
                        'X-API-Key': API_TOKEN,
                        'Content-Type': 'application/json',
                        'Origin': 'https://example.com'
                    }
                });
                
                const data = await response.json();
                
                addResult('Réponse données', {
                    status: response.status,
                    statusText: response.statusText,
                    headers: {
                        'Content-Type': response.headers.get('Content-Type'),
                        'Cache-Control': response.headers.get('Cache-Control'),
                        'Access-Control-Allow-Origin': response.headers.get('Access-Control-Allow-Origin')
                    },
                    data: data
                }, response.ok ? 'success' : 'error');
                
            } catch (error) {
                addResult('Erreur accès données', error.message, 'error');
            }
        }

        async function testWithoutToken() {
            try {
                addResult('Test 3: Accès sans token', 'Envoi d\'une requête sans authentification...', 'warning');
                
                const response = await fetch(`${API_URL}/all`, {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json',
                        'Origin': 'https://example.com'
                    }
                });
                
                const data = await response.text();
                
                addResult('Réponse sans token', {
                    status: response.status,
                    statusText: response.statusText,
                    response: data
                }, 'warning');
                
            } catch (error) {
                addResult('Erreur accès sans token', error.message, 'error');
            }
        }

        async function testSpecificEndpoints() {
            const endpoints = ['projects', 'skills', 'experiences', 'testimonials'];
            
            for (const endpoint of endpoints) {
                try {
                    addResult(`Test ${endpoint}`, `Accès à /${endpoint}...`, 'warning');
                    
                    const response = await fetch(`${API_URL}/${endpoint}`, {
                        method: 'GET',
                        headers: {
                            'Authorization': `Bearer ${API_TOKEN}`,
                            'X-API-Key': API_TOKEN,
                            'Content-Type': 'application/json',
                            'Origin': 'https://example.com'
                        }
                    });
                    
                    const data = await response.json();
                    
                    addResult(`Réponse ${endpoint}`, {
                        status: response.status,
                        dataCount: data.data ? (Array.isArray(data.data) ? data.data.length : 'N/A') : 0
                    }, response.ok ? 'success' : 'error');
                    
                } catch (error) {
                    addResult(`Erreur ${endpoint}`, error.message, 'error');
                }
            }
        }

        // Lancer tous les tests
        async function runAllTests() {
            addResult('Début des tests', 'Démarrage des tests d\'accès externe...', 'info');
            
            await testCORS();
            await testDataAccess();
            await testWithoutToken();
            await testSpecificEndpoints();
            
            addResult('Fin des tests', 'Tous les tests ont été exécutés.', 'info');
        }

        // Exécuter les tests au chargement de la page
        runAllTests();
    </script>
</body>
</html>
